<section class="rounded-2xl border border-slate-200 bg-white p-6">
	<header class="mb-6">
		<h1 class="text-lg font-semibold text-slate-900">Cliente</h1>
		<p class="text-sm text-slate-500">Datos basicos del cliente.</p>
	</header>

	<form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
		<div class="rounded-xl border border-slate-200 p-4">
			<h2 class="text-sm font-semibold text-slate-900">Datos personales</h2>
			<div class="mt-4 grid gap-4 sm:grid-cols-2">
				<div>
					<label for="nombre" class="text-xs text-slate-500">Nombre</label>
					<input id="nombre" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="nombre">
				</div>
				<div>
					<label for="email" class="text-xs text-slate-500">Email</label>
					<input id="email" type="email" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="email">
				</div>
				<div>
					<label for="telefono" class="text-xs text-slate-500">Telefono</label>
					<input id="telefono" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="telefono">
				</div>
				<div>
					<label for="rut" class="text-xs text-slate-500">RUT</label>
					<input id="rut" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="rut">
				</div>
			</div>
		</div>

		<div class="rounded-xl border border-slate-200 p-4">
			<h2 class="text-sm font-semibold text-slate-900">Direccion</h2>
			<div class="mt-4 grid gap-4 sm:grid-cols-2">
				<div class="sm:col-span-2">
					<label for="direccion" class="text-xs text-slate-500">Direccion</label>
					<input id="direccion" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="direccion">
				</div>
				<div>
					<label for="comuna" class="text-xs text-slate-500">Comuna</label>
					<input id="comuna" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="comuna">
				</div>
				<div>
					<label for="ciudad" class="text-xs text-slate-500">Ciudad</label>
					<input id="ciudad" class="mt-1 w-full rounded-lg border border-slate-200 px-3 py-2 text-sm" formControlName="ciudad">
				</div>
			</div>
		</div>

		<button
			type="submit"
			class="rounded-lg bg-slate-900 px-4 py-2 text-sm text-white"
			[disabled]="isSubmitting()"
		>
			{{ isSubmitting() ? 'Guardando...' : 'Guardar' }}
		</button>
	</form>
</section>
