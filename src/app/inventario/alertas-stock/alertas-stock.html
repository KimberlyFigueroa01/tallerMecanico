@if (alertas().length > 0) {
	<div class="alerta">
		<strong>Repuestos bajo minimo</strong>
		<ul>
			@for (item of alertas(); track item.id) {
				<li>
					<span>{{ item.nombre }} ({{ item.stock }}/{{ item.stockMin }})</span>
					<button [routerLink]="['/inventario/repuesto', item.id]">Reordenar</button>
				</li>
			}
		</ul>
	</div>
}
