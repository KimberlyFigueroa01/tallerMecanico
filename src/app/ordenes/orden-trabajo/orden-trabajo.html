<div class="space-y-3">
	@for (tarea of tareas(); track tarea.id) {
		<div class="flex items-center justify-between rounded-lg border border-slate-200 bg-white p-3">
			<div>
				<p class="text-sm font-semibold text-slate-900">{{ tarea.descripcion }}</p>
				<p class="text-xs text-slate-500">{{ tarea.mecanico }}</p>
			</div>
			<button
				class="rounded-full border px-3 py-1 text-xs"
				[class.border-slate-900]="tarea.completada"
				[class.text-slate-900]="tarea.completada"
				[class.border-slate-200]="!tarea.completada"
				[class.text-slate-500]="!tarea.completada"
				(click)="toggle.emit(tarea)"
			>
				{{ tarea.completada ? 'Completada' : 'Pendiente' }}
			</button>
		</div>
	}
</div>
