<section class="space-y-6">
	<header>
		<h1 class="text-lg font-semibold text-slate-900">Resumen financiero</h1>
		<p class="text-sm text-slate-500">Ingresos y gastos acumulados.</p>
	</header>
	<div class="grid gap-4 md:grid-cols-3">
		<div class="rounded-xl border border-slate-200 bg-white p-4">
			<span class="text-xs text-slate-500">Ingresos</span>
			<strong class="mt-2 block text-2xl text-slate-900">$52.000</strong>
		</div>
		<div class="rounded-xl border border-slate-200 bg-white p-4">
			<span class="text-xs text-slate-500">Gastos</span>
			<strong class="mt-2 block text-2xl text-slate-900">$18.400</strong>
		</div>
		<div class="rounded-xl border border-slate-200 bg-white p-4">
			<span class="text-xs text-slate-500">Margen</span>
			<strong class="mt-2 block text-2xl text-slate-900">$33.600</strong>
		</div>
	</div>
	<div class="rounded-xl border border-slate-200 bg-white p-4">
		<app-line-chart [data]="data()"></app-line-chart>
	</div>
</section>
