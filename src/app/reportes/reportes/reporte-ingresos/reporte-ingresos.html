<section class="space-y-6">
	<header>
		<h1 class="text-lg font-semibold text-slate-900">Reporte de ingresos</h1>
		<p class="text-sm text-slate-500">Resumen de ingresos por periodo.</p>
	</header>
	<div class="flex items-center gap-3">
		<label for="periodo" class="text-xs text-slate-500">Periodo</label>
		<select id="periodo" class="rounded-lg border border-slate-200 px-3 py-2 text-sm">
			<option>Mes</option>
			<option>Trimestre</option>
			<option>Anio</option>
		</select>
	</div>
	<div class="rounded-xl border border-slate-200 bg-white p-4">
		<app-line-chart [data]="data()"></app-line-chart>
	</div>
</section>
