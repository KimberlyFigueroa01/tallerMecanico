<div class="forgot-container">
	<div class="forgot-card">
		<img
			[ngSrc]="theme.logo"
			width="96"
			height="96"
			alt="Logo del taller"
			class="forgot-logo"
		>
		<h2>Recuperar contrasena</h2>

		@if (successMessage()) {
			<p class="form-success" role="status">{{ successMessage() }}</p>
		}

		@if (errorMessage()) {
			<p class="form-error" role="alert">{{ errorMessage() }}</p>
		}

		<form [formGroup]="form" (ngSubmit)="submit()" novalidate>
			<div class="input-group">
				<label for="email">Email</label>
				<input
					id="email"
					type="email"
					formControlName="email"
					[class.input-error]="form.controls.email.invalid && (form.controls.email.touched || formSubmitted())"
					[attr.aria-invalid]="form.controls.email.invalid && (form.controls.email.touched || formSubmitted()) ? 'true' : 'false'"
					autocomplete="email"
				>
				@if (form.controls.email.invalid && (form.controls.email.touched || formSubmitted())) {
					<p class="field-error">Ingresa un email valido.</p>
				}
			</div>

			<button type="submit" class="primary-btn" [disabled]="isSubmitting()">
				{{ isSubmitting() ? 'Enviando...' : 'Enviar instrucciones' }}
			</button>
		</form>

		<button type="button" class="link-btn" (click)="backToLogin()">Volver al login</button>
	</div>
</div>
