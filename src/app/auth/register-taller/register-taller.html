<section>
	<h1>Registro de Taller</h1>
	<p>Completa estos datos para crear tu cuenta de taller.</p>

	<form>
		<label for="taller-name">Nombre del taller</label>
		<input id="taller-name" type="text" placeholder="Taller Central" />

		<label for="owner-name">Nombre del responsable</label>
		<input id="owner-name" type="text" placeholder="Nombre completo" />

		<label for="register-email">Correo</label>
		<input id="register-email" type="email" placeholder="correo@ejemplo.com" />

		<button type="submit">Crear cuenta</button>
	</form>
</section>
