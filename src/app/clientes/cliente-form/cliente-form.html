<section>
	<h1>Formulario de Cliente</h1>
	<p>Registra o actualiza los datos del cliente.</p>

	<form>
		<label for="nombre">Nombre completo</label>
		<input id="nombre" type="text" placeholder="Nombre del cliente" />

		<label for="telefono">Telefono</label>
		<input id="telefono" type="tel" placeholder="3001234567" />

		<label for="correo">Correo</label>
		<input id="correo" type="email" placeholder="cliente@email.com" />

		<button type="submit">Guardar cliente</button>
	</form>
</section>
