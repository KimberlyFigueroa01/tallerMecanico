<div class="space-y-4">
	@for (item of items(); track item.titulo) {
		<div class="flex gap-3">
			<div class="flex flex-col items-center">
				<span class="mt-1 h-2 w-2 rounded-full bg-slate-900"></span>
				<span class="mt-1 h-full w-[2px] bg-slate-200"></span>
			</div>
			<div class="rounded-lg border border-slate-200 bg-white p-3">
				<p class="text-xs text-slate-400">{{ item.fecha | date: 'dd/MM/yyyy' }}</p>
				<p class="text-sm font-semibold text-slate-900">{{ item.titulo }}</p>
				<p class="text-xs text-slate-600">{{ item.detalle }}</p>
			</div>
		</div>
	}
</div>
