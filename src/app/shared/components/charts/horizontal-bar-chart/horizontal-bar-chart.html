<div class="space-y-2">
	@for (bar of bars(); track bar.label) {
		<div class="grid grid-cols-[120px_1fr_48px] items-center gap-2 text-xs">
			<span class="text-slate-600">{{ bar.label }}</span>
			<svg viewBox="0 0 100 8" class="h-2 w-full">
				<rect x="0" y="0" width="100" height="8" fill="#e2e8f0" rx="4"></rect>
				<rect x="0" y="0" [attr.width]="bar.width" height="8" [attr.fill]="bar.color" rx="4"></rect>
			</svg>
			<span class="text-right text-slate-400">{{ bar.value }}</span>
		</div>
	}
</div>
