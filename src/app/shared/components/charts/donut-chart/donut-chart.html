<div class="flex flex-wrap items-center gap-4">
	<svg viewBox="0 0 42 42" class="donut-svg">
		<circle cx="21" cy="21" r="15.915" fill="none" stroke="#e2e8f0" stroke-width="6"></circle>
		@for (segment of segments(); track segment.label) {
			<circle
				cx="21"
				cy="21"
				r="15.915"
				fill="none"
				stroke-width="6"
				[attr.stroke]="segment.color"
				[attr.stroke-dasharray]="segment.dash"
				[attr.stroke-dashoffset]="segment.offset"
				transform="rotate(-90 21 21)"
			></circle>
		}
	</svg>
	<div class="space-y-2 text-xs text-slate-600">
		@for (segment of segments(); track segment.label) {
			<div class="flex items-center gap-2">
				<span class="h-2 w-2 rounded-full" [style.backgroundColor]="segment.color"></span>
				<span>{{ segment.label }}</span>
				<span class="text-slate-400">{{ segment.value }}</span>
			</div>
		}
	</div>
</div>
