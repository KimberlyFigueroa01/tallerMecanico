<div class="space-y-2">
	<svg viewBox="0 0 100 60" class="chart-svg">
		<path [attr.d]="areaPath()" fill="rgba(15, 23, 42, 0.12)"></path>
		<path [attr.d]="linePath()" fill="none" stroke="#0f172a" stroke-width="1.2"></path>
		@for (point of points(); track point.label) {
			<circle [attr.cx]="point.x" [attr.cy]="point.y" r="1.6" fill="#0f172a"></circle>
		}
	</svg>
	<div class="grid gap-2 text-[11px] text-slate-500" [style.gridTemplateColumns]="gridTemplate()">
		@for (point of points(); track point.label) {
			<span class="text-center">{{ point.label }}</span>
		}
	</div>
</div>
